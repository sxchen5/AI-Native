# 在 Nacos 控制台创建配置：
# Data ID: chat-service.yaml
# Group: DEFAULT_GROUP（或与你 bootstrap.yml 中的 spring.cloud.nacos.config.group 一致）
# 配置格式: YAML

spring:
  ai:
    openai-sdk:
      api-key: ${OPENAI_API_KEY}
      base-url: ${OPENAI_BASE_URL:https://api.openai.com}
      chat:
        options:
          model: ${OPENAI_MODEL:gpt-4o-mini}

# 智谱（zai-sdk）：按需启用
app:
  zhipu:
    enabled: ${ZHIPU_ENABLED:false}
    api-key: ${ZHIPU_API_KEY:}
    model: ${ZHIPU_MODEL:glm-4-flash}
    base-url: ${ZHIPU_BASE_URL:https://open.bigmodel.cn/api/paas/v4/}
