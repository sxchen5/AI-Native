server:
  port: 8081
  # 浏览器 SSE 长连接：避免 Tomcat 在模型仍输出时先断开客户端
  tomcat:
    connection-timeout: ${TOMCAT_CONNECTION_TIMEOUT:1800000}

spring:
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  autoconfigure:
    exclude:
      # 使用自定义登录逻辑，禁用 Boot 默认随机用户
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
      # 使用 OpenAiManualConfiguration 显式装配；避免依赖 jar 内的自动配置与手动 Bean 冲突
      - org.springframework.ai.model.openaisdk.autoconfigure.OpenAiSdkChatAutoConfiguration
      - org.springframework.ai.model.openaisdk.autoconfigure.OpenAiSdkEmbeddingAutoConfiguration
      - org.springframework.ai.model.openaisdk.autoconfigure.OpenAiSdkImageAutoConfiguration
      - org.springframework.ai.model.openaisdk.autoconfigure.OpenAiSdkAudioSpeechAutoConfiguration
  main:
    # Spring Boot 3.3 + 部分生态组件会重复注册同名 Jackson 模块 Bean；允许后者覆盖前者，避免启动失败
    allow-bean-definition-overriding: true
  application:
    name: chat-service
  # Spring AI 2.0（OpenAI Java SDK 集成路径）
  # - OpenAI：默认 base-url + OPENAI_API_KEY
  # - 通义千问兼容模式：base-url=https://dashscope.aliyuncs.com/compatible-mode/v1
  # - 百度千帆 OpenAI 兼容：base-url=https://qianfan.baidubce.com/v2
  ai:
    openai-sdk:
      api-key: ${OPENAI_API_KEY:changeme}
      base-url: ${OPENAI_BASE_URL:https://api.openai.com}
      # 流式长回复时 OkHttp 默认超时偏短会报 OpenAIIoException: Stream failed / InterruptedIOException: timeout
      # 可用环境变量 OPENAI_HTTP_TIMEOUT 覆盖，例如 20m、3600s
      timeout: ${OPENAI_HTTP_TIMEOUT:15m}
      chat:
        options:
          model: ${OPENAI_MODEL:gpt-4o-mini}

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    org.springframework.ai: INFO
    com.example.doubaoai: INFO

# 智谱 AI（官方 zai-sdk）：app.zhipu.enabled=true 时生效；api-key 可写在本文件或通过 ZHIPU_API_KEY 注入
app:
  zhipu:
    enabled: ${ZHIPU_ENABLED:false}
    api-key: ${ZHIPU_API_KEY:}
    model: ${ZHIPU_MODEL:glm-4-flash}
    base-url: ${ZHIPU_BASE_URL:https://open.bigmodel.cn/api/paas/v4/}
  auth:
    users:
      - username: demo
        password: demo123
      - username: admin
        password: admin123
