server:
  port: 8081

spring:
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  autoconfigure:
    exclude:
      # 使用自定义登录逻辑，禁用 Boot 默认随机用户
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
      # 使用 OpenAiManualConfiguration 显式装配；避免依赖 jar 内的自动配置与手动 Bean 冲突
      - org.springframework.ai.model.openaisdk.autoconfigure.OpenAiSdkChatAutoConfiguration
      - org.springframework.ai.model.openaisdk.autoconfigure.OpenAiSdkEmbeddingAutoConfiguration
      - org.springframework.ai.model.openaisdk.autoconfigure.OpenAiSdkImageAutoConfiguration
      - org.springframework.ai.model.openaisdk.autoconfigure.OpenAiSdkAudioSpeechAutoConfiguration
  main:
    # Spring Boot 3.3 + 部分生态组件会重复注册同名 Jackson 模块 Bean；允许后者覆盖前者，避免启动失败
    allow-bean-definition-overriding: true
  application:
    name: chat-service
  # Spring AI 2.0（OpenAI Java SDK 集成路径）
  # - OpenAI：默认 base-url + OPENAI_API_KEY
  # - 通义千问兼容模式：base-url=https://dashscope.aliyuncs.com/compatible-mode/v1
  # - 百度千帆 OpenAI 兼容：base-url=https://qianfan.baidubce.com/v2
  ai:
    openai-sdk:
      api-key: ${OPENAI_API_KEY:changeme}
      base-url: ${OPENAI_BASE_URL:https://api.openai.com}
      chat:
        options:
          model: ${OPENAI_MODEL:gpt-4o-mini}

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    org.springframework.ai: INFO

# 演示登录（明文密码，仅本地使用；生产请接入统一认证）
app:
  auth:
    users:
      - username: demo
        password: demo123
      - username: admin
        password: admin123
